name: agentinsight

services:
  agentinsight-backend:
    build: ./agentinsight-api
    image: agentinsight-backend
    container_name: agentinsight-backend
    ports:
      - "${AGENTINSIGHT_API_PORT:-8081}:8081"
    environment:
      AGENTINSIGHT_CODEX_HOME: /codex
      AGENTINSIGHT_DATA_PATH: /data
      AGENTINSIGHT_DB_PATH: /data/agentinsight.db
      SERVER_PORT: ${SERVER_PORT:-8081}
    volumes:
      - ${AGENTINSIGHT_CODEX_HOME:-${HOME}/.codex}:/codex:ro
      - agentinsight-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  agentinsight-ui:
    build: ./agentinsight-ui
    image: agentinsight-ui
    container_name: agentinsight-ui
    ports:
      - "${AGENTINSIGHT_UI_PORT:-5173}:80"
    depends_on:
      agentinsight-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  agentinsight-data:

networks:
  default:
    name: agentinsight-network
